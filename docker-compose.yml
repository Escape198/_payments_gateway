services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    ports: ["5432:5432"]
    volumes:
      - ./src/payments/infrastructure/db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro

  redis:
    image: redis:7
    ports: ["6379:6379"]

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports: ["9092:9092"]

  fake-psp:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn payments.infrastructure.fake_psp.app:app --host 0.0.0.0 --port 9000
    environment:
      FAKE_PSP_API_KEY: sk_fake_demo
      FAKE_PSP_WEBHOOK_SECRET: whsec_fake_demo
      FAKE_PSP_WEBHOOK_URL: http://gateway:8000/v1/webhooks/fake
    ports: ["9000:9000"]

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn payments.api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://gateway:gateway@postgres:5432/gateway
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP: redpanda:9092
      GATEWAY_BASE_URL: http://gateway:8000
    depends_on: [postgres, redis, redpanda]
    ports: ["8000:8000"]
