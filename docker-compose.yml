services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    ports: ["5432:5432"]
    volumes:
      - ./src/payments/infrastructure/db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro

  redis:
    image: redis:7
    ports: ["6379:6379"]

  redpanda:
    image: redpandadata/redpanda:latest
    command: >
      redpanda start --smp 1 --memory 512M --reserve-memory 0M --overprovisioned
      --node-id 0 --check=false
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports: ["9092:9092"]

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add: ["IPC_LOCK"]
    ports: ["8200:8200"]
